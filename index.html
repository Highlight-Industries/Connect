<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>HI Connect</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
<link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">

<!-- Theme -->
<meta name="theme-color" content="#1F8F3A">

<!-- iOS App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HI Connect">

<!-- Styles -->
<link rel="stylesheet" href="./styles.css">

</head>

<body>

<!-- DESKTOP HEADER -->
<header class="desk-header" id="deskHeader">

  <div class="desk-topbar">

    <div class="search-wrap">

      <input
        id="employeeSearch"
        type="text"
        placeholder="Find employee..."
        autocomplete="off"
      >

      <button id="openBtn">Open</button>
      <button id="clearBtn">Clear</button>

    </div>

  </div>

</header>

<!-- DESKTOP CARD -->
<section class="desk-card" id="deskCard">

  <div class="desk-photo">
    <img id="photoDesk" src="./assets/building.jpg" alt="Employee Photo">
  </div>

  <div class="desk-info">

    <h1 id="nameDesk">Name</h1>
    <h2 id="titleDesk">Title</h2>

    <div class="desk-contact">

      <a id="emailLinkDesk">
        <span id="emailDesk"></span>
      </a>

      <a id="phoneLinkDesk">
        <span id="phoneDesk"></span>
      </a>

      <a id="webLinkDesk">
        <span id="webDesk"></span>
      </a>

    </div>

  </div>

  <div class="desk-actions">

    <button id="saveBtnDesk">Save Contact</button>
    <button id="sendBtnDesk">Share</button>

    <img id="qrDesk" alt="QR Code">

  </div>

</section>


<!-- MOBILE SHELL -->
<section id="mobShell">

  <div class="mob-hero">

    <img id="photoMob" class="mob-portrait" src="./assets/building.jpg" alt="Employee Photo">

  </div>

  <div class="mob-details">

    <h1 id="nameMob"></h1>
    <h2 id="titleMob"></h2>

    <div class="mob-contact">

      <a id="emailLinkMob">
        <span id="emailMob"></span>
      </a>

      <a id="phoneLinkMob">
        <span id="phoneMob"></span>
      </a>

      <a id="webLinkMob">
        <span id="webMob"></span>
      </a>

    </div>

    <img id="qrMob" alt="QR Code">

  </div>

</section>


<!-- SHARE MODAL -->
<dialog id="shareModalMob">

  <h3>Share Contact</h3>

  <button id="copyLinkBtnMob">Copy Link</button>
  <button id="textLinkBtnMob">Text</button>
  <button id="emailLinkBtnMob">Email</button>

  <button onclick="this.closest('dialog').close()">Close</button>

</dialog>


<!-- FIND MODAL -->
<dialog id="findModal">

  <input
    id="employeeSearchMob"
    type="text"
    placeholder="Search employees..."
    autocomplete="off"
  >

  <div id="findResults"></div>

  <button onclick="this.closest('dialog').close()">Close</button>

</dialog>


<!-- Toast -->
<div id="toast"></div>


<!-- App Script -->
<script src="./app.js"></script>


<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
}
</script>

</body>
</html>
